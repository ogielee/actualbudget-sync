name: Weekly Budget Sheet Sync

on:
  schedule:
    # 19:00 UTC Sun/Tue/Thu = 7am NZST (UTC+12) Mon/Wed/Fri — 8am during NZDT (UTC+13) in summer
    - cron: "0 19 * * 0,2,4"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print what would be set, no writes)"
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync @actual-app/api version to server
        run: |
          SERVER_VERSION=$(curl -s "$ACTUAL_SERVER/info" 2>/dev/null | jq -r '.build.version // empty' 2>/dev/null || true)
          INSTALLED=$(node -e "console.log(require('./node_modules/@actual-app/api/package.json').version)")
          echo "Server: ${SERVER_VERSION:-unknown}  Installed: $INSTALLED"
          if [ -n "$SERVER_VERSION" ] && [ "$SERVER_VERSION" != "$INSTALLED" ]; then
            NEWER=$(printf '%s\n%s\n' "$SERVER_VERSION" "$INSTALLED" | sort -V | tail -1)
            if [ "$NEWER" = "$SERVER_VERSION" ]; then
              echo "Server is newer — upgrading @actual-app/api to $SERVER_VERSION"
              pnpm add @actual-app/api@$SERVER_VERSION
            else
              echo "Installed ($INSTALLED) >= server ($SERVER_VERSION) — keeping installed version"
            fi
          fi
        env:
          ACTUAL_SERVER: ${{ secrets.ACTUAL_SERVER }}

      - name: Build
        run: pnpm build

      - name: Create data directory
        run: mkdir -p /tmp/actual-data

      - name: Run sheet sync
        run: node dist/sheet-sync.cjs ${{ inputs.dry_run == 'true' && '--dry-run' || '' }}
        env:
          ACTUAL_SERVER: ${{ secrets.ACTUAL_SERVER }}
          ACTUAL_PASSWORD: ${{ secrets.ACTUAL_PASSWORD }}
          ACTUAL_SYNC_ID: ${{ secrets.ACTUAL_SYNC_ID }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          ACTUAL_DATA: /tmp/actual-data
