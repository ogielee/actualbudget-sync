name: Weekly Budget Sheet Sync

on:
  schedule:
    # 19:00 UTC Sun/Tue/Thu = 7am NZST (UTC+12) Mon/Wed/Fri — 8am during NZDT (UTC+13) in summer
    - cron: "0 19 * * 0,2,4"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print what would be set, no writes)"
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Match @actual-app/api to the latest release
        # The Actual server (self-hosted on PikaPods) auto-updates to the latest
        # release. A client OLDER than the server can't load the budget and fails
        # with "out-of-sync-migrations"; a client >= the server migrates the file
        # forward fine — so always install the latest published client.
        #
        # This replaces an earlier "$ACTUAL_SERVER/info" version probe that never
        # worked: on this deployment that path falls through to the web app and
        # returns HTML, so the parsed version was always empty and the upgrade was
        # silently skipped — leaving the client pinned until a server update broke it.
        run: pnpm add @actual-app/api@latest

      - name: Build
        run: pnpm build

      - name: Create data directory
        run: mkdir -p /tmp/actual-data

      - name: Run sheet sync
        run: node dist/sheet-sync.cjs ${{ inputs.dry_run == 'true' && '--dry-run' || '' }}
        env:
          ACTUAL_SERVER: ${{ secrets.ACTUAL_SERVER }}
          ACTUAL_PASSWORD: ${{ secrets.ACTUAL_PASSWORD }}
          ACTUAL_SYNC_ID: ${{ secrets.ACTUAL_SYNC_ID }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          ACTUAL_DATA: /tmp/actual-data
