name: Akahu → Actual Transaction Sync

on:
  schedule:
    - cron: "0 */4 * * *" # Every 4 hours
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Sync @actual-app/api version to server
        run: |
          SERVER_VERSION=$(curl -s "$ACTUAL_SERVER/info" 2>/dev/null | jq -r '.build.version // empty' 2>/dev/null || true)
          INSTALLED=$(node -e "console.log(require('./node_modules/@actual-app/api/package.json').version)")
          echo "Server: ${SERVER_VERSION:-unknown}  Installed: $INSTALLED"
          if [ -n "$SERVER_VERSION" ] && [ "$SERVER_VERSION" != "$INSTALLED" ]; then
            NEWER=$(printf '%s\n%s\n' "$SERVER_VERSION" "$INSTALLED" | sort -V | tail -1)
            if [ "$NEWER" = "$SERVER_VERSION" ]; then
              echo "Server is newer — upgrading @actual-app/api to $SERVER_VERSION"
              pnpm add @actual-app/api@$SERVER_VERSION
            else
              echo "Installed ($INSTALLED) >= server ($SERVER_VERSION) — keeping installed version"
            fi
          fi
        env:
          ACTUAL_SERVER: ${{ secrets.ACTUAL_SERVER }}

      - name: Patch @actual-app/api exports
        run: |
          node -e "
            const fs = require('fs');
            const path = 'node_modules/@actual-app/api/package.json';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
            if (!pkg.exports['./package.json']) {
              pkg.exports['./package.json'] = './package.json';
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2));
              console.log('Patched @actual-app/api exports');
            }
          "

      - name: Build
        run: pnpm build

      - name: Create data directory
        run: mkdir -p /tmp/actual-data

      - name: Run sync
        env:
          ACTUAL_SERVER: ${{ secrets.ACTUAL_SERVER }}
          ACTUAL_SYNC_ID: ${{ secrets.ACTUAL_SYNC_ID }}
          ACTUAL_PASSWORD: ${{ secrets.ACTUAL_PASSWORD }}
          ACTUAL_DATA: /tmp/actual-data
          AKAHU_APP_TOKEN: ${{ secrets.AKAHU_APP_TOKEN }}
          AKAHU_USER_TOKEN: ${{ secrets.AKAHU_USER_TOKEN }}
        run: |
          node dist/main.cjs --bank akahu --sync-days 30 \
            --accounts "10170e5c-b4c0-423f-9125-b1b74a9dcb69=acc_cmprk93fp005b02l7ficqc3wv" \
            --accounts "ccac8724-7348-4eb3-a70c-39cfe6b66661=acc_cmprk93fv005d02l7ezjoczny" \
            --accounts "73894fda-4db3-4dcc-92c5-f62973436c70=acc_cmprk93g1005f02l70lfa5m7z" \
            --accounts "d2edf7ee-2fb7-43e5-999d-1e91c58f95c6=acc_cmprkay06003n02kzf8ab5jz1" \
            --accounts "79e1de12-ee3c-413f-8b3b-1252aa33f046=acc_cmprke32w007402l26vb4d5hv" \
            --transfer-match "jointipsave=d2edf7ee-2fb7-43e5-999d-1e91c58f95c6" \
            --transfer-match "payPHairfre=d2edf7ee-2fb7-43e5-999d-1e91c58f95c6" \
            --transfer-match "kenziesaving=6f0c4678-3aac-45e8-b7ad-509cb710aeeb" \
            --transfer-match "jointsaving=726e8b38-3063-4672-8016-26001d6dacde"
